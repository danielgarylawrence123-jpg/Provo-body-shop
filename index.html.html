<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Provo Body Shop - Estimate Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            min-height: 100vh;
            padding: 10px;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
            }
            
            .container {
                border-radius: 0;
                min-height: 100vh;
            }
        }

        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            color: white;
            padding: 20px 15px;
            text-align: center;
            position: relative;
            border-bottom: 3px solid #ff6b00;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .header p {
            font-size: 1em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .owner-name {
            font-size: 0.9em;
            opacity: 0.8;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }
            
            .header p {
                font-size: 0.9em;
            }
        }

        .content {
            padding: 15px;
        }

        .section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #ff6b00;
        }

        .section h2 {
            color: #1a1a1a;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        @media (max-width: 768px) {
            .content {
                padding: 10px;
            }
            
            .section {
                padding: 12px;
                margin-bottom: 15px;
            }
            
            .section h2 {
                font-size: 1.2em;
            }
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }

        @media (max-width: 768px) {
            input[type="text"],
            input[type="number"],
            select {
                padding: 14px;
                font-size: 16px;
            }
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #ff6b00;
        }

        .car-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        @media (max-width: 768px) {
            .car-info-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }

        .parts-container {
            margin-top: 20px;
        }

        .part-item {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            position: relative;
        }

        .part-item-grid {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 15px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .part-item {
                padding: 12px;
            }
            
            .part-item-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }

        .part-image-container {
            width: 120px;
            height: 120px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        @media (max-width: 768px) {
            .part-image-container {
                width: 100%;
                max-width: 200px;
                height: 150px;
                margin: 0 auto;
            }
        }

        .part-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .part-image-placeholder {
            color: #999;
            text-align: center;
            font-size: 12px;
        }

        .part-details {
            flex: 1;
        }

        .part-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .part-name-number {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .part-details-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            
            .part-name-number {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }

        .remove-part-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .remove-part-btn:hover {
            background: #c82333;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
            margin-top: 10px;
            width: auto;
        }

        @media (max-width: 768px) {
            .btn {
                width: 100%;
                padding: 16px;
                margin-right: 0;
                font-size: 16px;
            }
        }

        .btn-primary {
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            color: white;
            border: 2px solid #ff6b00;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 0, 0.4);
            background: linear-gradient(135deg, #ff6b00 0%, #ff8533 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(86, 171, 47, 0.4);
        }

        .total-section {
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: right;
            border: 2px solid #ff6b00;
        }

        .total-section h3 {
            font-size: 2em;
            margin-top: 10px;
        }

        .image-input {
            display: none;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-header h2 {
            margin-bottom: 0;
        }

        .mic-button-small {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b00 0%, #ff8533 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(255, 107, 0, 0.3);
            flex-shrink: 0;
        }

        .mic-button-small:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.5);
        }

        .mic-button-small.listening {
            animation: pulse 1.5s infinite;
            background: linear-gradient(135deg, #ff3333 0%, #ff6666 100%);
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 2px 8px rgba(255, 51, 51, 0.5);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 4px 15px rgba(255, 51, 51, 0.8);
            }
        }

        @media (max-width: 768px) {
            .mic-button-small {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }

        @media print {
            body {
                background: white;
            }
            .btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Provo Body Shop</h1>
            <p>Professional Auto Body Repair Estimates</p>
            <p class="owner-name">Gary Lawrence</p>
        </div>

        <div class="content">
            <!-- Customer & Vehicle Information -->
            <div class="section">
                <div class="section-header">
                    <h2>Customer & Vehicle Information</h2>
                    <button class="mic-button-small" onclick="toggleVoiceRecognition('vehicle')" title="Use voice to fill vehicle info">🎤</button>
                </div>
                <div class="car-info-grid">
                    <div class="form-group">
                        <label>Customer Name</label>
                        <input type="text" id="customerName" placeholder="Enter customer name">
                    </div>
                    <div class="form-group">
                        <label>Estimate Date</label>
                        <input type="text" id="estimateDate" value="">
                    </div>
                    <div class="form-group">
                        <label>Vehicle Year</label>
                        <input type="number" id="vehicleYear" placeholder="e.g., 2020">
                    </div>
                    <div class="form-group">
                        <label>Vehicle Make</label>
                        <input type="text" id="vehicleMake" placeholder="e.g., Toyota">
                    </div>
                    <div class="form-group">
                        <label>Vehicle Model</label>
                        <input type="text" id="vehicleModel" placeholder="e.g., Camry">
                    </div>
                    <div class="form-group">
                        <label>VIN Number</label>
                        <input type="text" id="vinNumber" placeholder="Enter VIN">
                    </div>
                </div>
            </div>

            <!-- Parts Section -->
            <div class="section">
                <div class="section-header">
                    <h2>Parts</h2>
                    <button class="mic-button-small" onclick="toggleVoiceRecognition('parts')" title="Use voice to add parts">🎤</button>
                </div>
                <div class="parts-container" id="partsContainer"></div>
                <button class="btn btn-primary" onclick="addPart()">+ Add Part</button>
            </div>

            <!-- Labor Section -->
            <div class="section">
                <div class="section-header">
                    <h2>Labor</h2>
                    <button class="mic-button-small" onclick="toggleVoiceRecognition('labor')" title="Use voice to add labor">🎤</button>
                </div>
                <div class="parts-container" id="laborContainer"></div>
                <button class="btn btn-primary" onclick="addLabor()">+ Add Labor</button>
            </div>

            <!-- Total Section -->
            <div class="total-section">
                <p>Total Estimate</p>
                <h3 id="totalAmount">$0.00</h3>
            </div>

            <!-- Action Buttons -->
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn btn-success" onclick="generatePDF()">📄 Generate PDF Estimate</button>
            </div>
        </div>
    </div>

    <script>
        let partCounter = 0;
        let laborCounter = 0;
        let parts = [];
        let labor = [];
        let recognition;
        let isListening = false;
        let currentSection = null;
        let currentMicButton = null;

        // Set today's date
        document.getElementById('estimateDate').value = new Date().toLocaleDateString();

        // Initialize Speech Recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                
                // Process final results
                if (event.results[event.results.length - 1].isFinal) {
                    processVoiceInput(transcript, currentSection);
                }
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                stopListening();
            };

            recognition.onend = () => {
                if (isListening) {
                    recognition.start(); // Restart if still supposed to be listening
                }
            };
        }

        function toggleVoiceRecognition(section) {
            if (!recognition) {
                alert('Voice recognition not supported in this browser');
                return;
            }
            
            const button = event.target;
            
            if (isListening && currentSection === section) {
                stopListening();
            } else {
                if (isListening) {
                    stopListening();
                }
                startListening(section, button);
            }
        }

        function startListening(section, button) {
            recognition.start();
            isListening = true;
            currentSection = section;
            currentMicButton = button;
            button.classList.add('listening');
        }

        function stopListening() {
            recognition.stop();
            isListening = false;
            if (currentMicButton) {
                currentMicButton.classList.remove('listening');
            }
            currentSection = null;
            currentMicButton = null;
        }

        function processVoiceInput(transcript, section) {
            const lowerTranscript = transcript.toLowerCase();
            
            if (section === 'vehicle') {
                // Extract customer name
                const nameMatch = lowerTranscript.match(/(?:customer|name|for|from)\s+(?:is\s+)?([a-z]+\s+[a-z]+)/i);
                if (nameMatch && nameMatch[1]) {
                    const name = nameMatch[1].split(' ').map(word => 
                        word.charAt(0).toUpperCase() + word.slice(1)
                    ).join(' ');
                    document.getElementById('customerName').value = name;
                }
                
                // Extract year
                const yearMatch = lowerTranscript.match(/\b(19|20)\d{2}\b/);
                if (yearMatch) {
                    document.getElementById('vehicleYear').value = yearMatch[0];
                }
                
                // Extract make (common car brands)
                const makes = ['toyota', 'honda', 'ford', 'chevrolet', 'chevy', 'nissan', 'bmw', 'mercedes', 'audi', 'volkswagen', 'vw', 'mazda', 'subaru', 'hyundai', 'kia', 'jeep', 'dodge', 'ram', 'gmc', 'cadillac', 'tesla', 'lexus', 'acura', 'infiniti', 'volvo', 'porsche', 'jaguar', 'land rover', 'mini', 'fiat', 'alfa romeo', 'buick', 'chrysler', 'lincoln', 'mitsubishi', 'suzuki'];
                for (const make of makes) {
                    const regex = new RegExp('\\b' + make + '\\b', 'i');
                    if (regex.test(lowerTranscript)) {
                        document.getElementById('vehicleMake').value = make.charAt(0).toUpperCase() + make.slice(1);
                        break;
                    }
                }
                
                // Extract model (after make if found)
                const makeValue = document.getElementById('vehicleMake').value.toLowerCase();
                if (makeValue) {
                    const makeIndex = lowerTranscript.indexOf(makeValue);
                    if (makeIndex !== -1) {
                        const afterMake = lowerTranscript.substring(makeIndex + makeValue.length).trim();
                        const modelMatch = afterMake.match(/^([a-z0-9\-]+)/i);
                        if (modelMatch) {
                            document.getElementById('vehicleModel').value = modelMatch[1].charAt(0).toUpperCase() + modelMatch[1].slice(1);
                        }
                    }
                }
                
                // Extract VIN if mentioned
                const vinMatch = lowerTranscript.match(/(?:vin|v\.i\.n\.?)\s*(?:is\s+|number\s+)?([a-z0-9]{17})/i);
                if (vinMatch) {
                    document.getElementById('vinNumber').value = vinMatch[1].toUpperCase();
                }
            } else if (section === 'parts') {
                // Extract damage/parts and add them
                const damages = ['bumper', 'fender', 'door', 'hood', 'trunk', 'mirror', 'headlight', 'taillight', 'windshield', 'window', 'panel', 'quarter panel', 'roof', 'grille', 'spoiler'];
                
                for (const damage of damages) {
                    const regex = new RegExp('\\b' + damage + '\\b', 'i');
                    if (regex.test(lowerTranscript)) {
                        addPart();
                        const lastPart = parts[parts.length - 1];
                        document.getElementById(`partName-${lastPart}`).value = damage.charAt(0).toUpperCase() + damage.slice(1);
                        generatePartImage(damage, lastPart);
                    }
                }
            } else if (section === 'labor') {
                // Extract labor descriptions
                const actions = ['paint', 'refinish', 'repair', 'fix', 'dent removal', 'scratch repair', 'bodywork', 'polish', 'buff'];
                
                for (const action of actions) {
                    const regex = new RegExp('\\b' + action + '\\b', 'i');
                    if (regex.test(lowerTranscript)) {
                        addLabor();
                        const lastLabor = labor[labor.length - 1];
                        document.getElementById(`laborName-${lastLabor}`).value = action.charAt(0).toUpperCase() + action.slice(1);
                        break;
                    }
                }
            }
        }

        function generatePartImage(partName, partId) {
            // Use a placeholder image API that generates images based on search terms
            const encodedPartName = encodeURIComponent(partName);
            // Using Unsplash Source for auto-generating images based on search
            const imageUrl = `https://source.unsplash.com/300x300/?car,auto,part,${encodedPartName}`;
            
            const imgElement = document.getElementById(`image-${partId}`);
            const placeholder = document.getElementById(`placeholder-${partId}`);
            
            if (partName.trim() !== '') {
                imgElement.src = imageUrl;
                imgElement.style.display = 'block';
                placeholder.style.display = 'none';
            }
        }

        function addPart() {
            partCounter++;
            const partItem = document.createElement('div');
            partItem.className = 'part-item';
            partItem.id = `part-${partCounter}`;
            
            partItem.innerHTML = `
                <button class="remove-part-btn" onclick="removePart(${partCounter})">✕ Remove</button>
                <div class="part-item-grid">
                    <div class="part-image-container" onclick="document.getElementById('imageInput-${partCounter}').click()">
                        <div class="part-image-placeholder" id="placeholder-${partCounter}">
                            Auto-generates<br>when part entered
                        </div>
                        <img id="image-${partCounter}" style="display: none;">
                    </div>
                    <div class="part-details">
                        <div class="part-name-number">
                            <div class="form-group">
                                <label>Part Name</label>
                                <input type="text" id="partName-${partCounter}" placeholder="e.g., Front Bumper" 
                                       onchange="generatePartImage(this.value, ${partCounter}); calculateTotal()" 
                                       onblur="generatePartImage(this.value, ${partCounter})">
                            </div>
                            <div class="form-group">
                                <label>Part Number</label>
                                <input type="text" id="partNumber-${partCounter}" placeholder="52119-06150" onchange="calculateTotal()">
                            </div>
                        </div>
                        <div class="form-group" style="margin-top: 10px;">
                            <label>Description</label>
                            <input type="text" id="description-${partCounter}" placeholder="Additional details" onchange="calculateTotal()">
                        </div>
                        <div class="part-details-grid" style="margin-top: 10px;">
                            <div class="form-group">
                                <label>Quantity</label>
                                <input type="number" id="quantity-${partCounter}" value="1" min="1" onchange="calculateTotal()">
                            </div>
                            <div class="form-group">
                                <label>Unit Price ($)</label>
                                <input type="number" id="price-${partCounter}" placeholder="0.00" step="0.01" min="0" onchange="calculateTotal()">
                            </div>
                        </div>
                        <div class="form-group" style="margin-top: 10px;">
                            <label>Line Total ($)</label>
                            <input type="number" id="lineTotal-${partCounter}" placeholder="0.00" step="0.01" readonly style="background: #e9ecef;">
                        </div>
                    </div>
                </div>
                <input type="file" class="image-input" id="imageInput-${partCounter}" accept="image/*" onchange="handleImageUpload(${partCounter})">
            `;
            
            document.getElementById('partsContainer').appendChild(partItem);
            parts.push(partCounter);
        }

        function addLabor() {
            laborCounter++;
            const laborItem = document.createElement('div');
            laborItem.className = 'part-item';
            laborItem.id = `labor-${laborCounter}`;
            
            laborItem.innerHTML = `
                <button class="remove-part-btn" onclick="removeLabor(${laborCounter})">✕ Remove</button>
                <div class="part-item-grid">
                    <div class="part-image-container" style="opacity: 0.5; cursor: default;">
                        <div class="part-image-placeholder">
                            🔧<br>Labor
                        </div>
                    </div>
                    <div class="part-details">
                        <div class="form-group">
                            <label>Labor Description</label>
                            <input type="text" id="laborName-${laborCounter}" placeholder="e.g., Paint & Refinish Front Bumper" onchange="calculateTotal()">
                        </div>
                        <div class="form-group" style="margin-top: 10px;">
                            <label>Labor Cost ($)</label>
                            <input type="number" id="laborPrice-${laborCounter}" placeholder="0.00" step="0.01" min="0" onchange="calculateTotal()">
                        </div>
                        <div class="form-group" style="margin-top: 10px;">
                            <label>Line Total ($)</label>
                            <input type="number" id="laborLineTotal-${laborCounter}" placeholder="0.00" step="0.01" readonly style="background: #e9ecef;">
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('laborContainer').appendChild(laborItem);
            labor.push(laborCounter);
        }

        function handleImageUpload(partId) {
            const fileInput = document.getElementById(`imageInput-${partId}`);
            const imgElement = document.getElementById(`image-${partId}`);
            const placeholder = document.getElementById(`placeholder-${partId}`);
            
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imgElement.src = e.target.result;
                    imgElement.style.display = 'block';
                    placeholder.style.display = 'none';
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        function removePart(partId) {
            const partElement = document.getElementById(`part-${partId}`);
            partElement.remove();
            parts = parts.filter(id => id !== partId);
            calculateTotal();
        }

        function removeLabor(laborId) {
            const laborElement = document.getElementById(`labor-${laborId}`);
            laborElement.remove();
            labor = labor.filter(id => id !== laborId);
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            
            // Calculate parts total
            parts.forEach(partId => {
                const quantity = parseFloat(document.getElementById(`quantity-${partId}`).value) || 0;
                const price = parseFloat(document.getElementById(`price-${partId}`).value) || 0;
                const lineTotal = quantity * price;
                
                document.getElementById(`lineTotal-${partId}`).value = lineTotal.toFixed(2);
                total += lineTotal;
            });
            
            // Calculate labor total
            labor.forEach(laborId => {
                const price = parseFloat(document.getElementById(`laborPrice-${laborId}`).value) || 0;
                
                document.getElementById(`laborLineTotal-${laborId}`).value = price.toFixed(2);
                total += price;
            });
            
            document.getElementById('totalAmount').textContent = `$${total.toFixed(2)}`;
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header
            doc.setFillColor(30, 60, 114);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(24);
            doc.text('Provo Body Shop', 105, 20, { align: 'center' });
            doc.setFontSize(12);
            doc.text('Professional Auto Body Repair Estimate', 105, 30, { align: 'center' });
            
            // Customer Info
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            let y = 50;
            
            doc.setFont(undefined, 'bold');
            doc.text('CUSTOMER & VEHICLE INFORMATION', 20, y);
            doc.setFont(undefined, 'normal');
            y += 7;
            
            const customerName = document.getElementById('customerName').value || 'N/A';
            const estimateDate = document.getElementById('estimateDate').value || 'N/A';
            const vehicleYear = document.getElementById('vehicleYear').value || 'N/A';
            const vehicleMake = document.getElementById('vehicleMake').value || 'N/A';
            const vehicleModel = document.getElementById('vehicleModel').value || 'N/A';
            const vinNumber = document.getElementById('vinNumber').value || 'N/A';
            
            doc.text(`Customer: ${customerName}`, 20, y);
            doc.text(`Date: ${estimateDate}`, 120, y);
            y += 6;
            doc.text(`Vehicle: ${vehicleYear} ${vehicleMake} ${vehicleModel}`, 20, y);
            y += 6;
            doc.text(`VIN: ${vinNumber}`, 20, y);
            y += 12;
            
            // Parts Section
            if (parts.length > 0) {
                doc.setFont(undefined, 'bold');
                doc.setFontSize(12);
                doc.text('PARTS', 20, y);
                y += 8;
                doc.setFontSize(10);
                
                doc.setFillColor(240, 240, 240);
                doc.rect(20, y, 170, 8, 'F');
                doc.text('Part Name', 22, y + 5);
                doc.text('Part #', 80, y + 5);
                doc.text('Qty', 120, y + 5);
                doc.text('Price', 140, y + 5);
                doc.text('Total', 170, y + 5);
                doc.setFont(undefined, 'normal');
                y += 10;
                
                parts.forEach(partId => {
                    const partName = document.getElementById(`partName-${partId}`).value || 'N/A';
                    const partNumber = document.getElementById(`partNumber-${partId}`).value || 'N/A';
                    const quantity = document.getElementById(`quantity-${partId}`).value || '0';
                    const price = document.getElementById(`price-${partId}`).value || '0';
                    const lineTotal = parseFloat(document.getElementById(`lineTotal-${partId}`).value) || 0;
                    
                    doc.text(partName.substring(0, 25), 22, y);
                    doc.text(partNumber, 80, y);
                    doc.text(quantity, 120, y);
                    doc.text(`$${parseFloat(price).toFixed(2)}`, 140, y);
                    doc.text(`$${lineTotal.toFixed(2)}`, 170, y);
                    
                    y += 6;
                    
                    if (y > 270) {
                        doc.addPage();
                        y = 20;
                    }
                });
                y += 5;
            }
            
            // Labor Section
            if (labor.length > 0) {
                doc.setFont(undefined, 'bold');
                doc.setFontSize(12);
                doc.text('LABOR', 20, y);
                y += 8;
                doc.setFontSize(10);
                
                doc.setFillColor(240, 240, 240);
                doc.rect(20, y, 170, 8, 'F');
                doc.text('Description', 22, y + 5);
                doc.text('Cost', 170, y + 5);
                doc.setFont(undefined, 'normal');
                y += 10;
                
                labor.forEach(laborId => {
                    const laborName = document.getElementById(`laborName-${laborId}`).value || 'N/A';
                    const lineTotal = parseFloat(document.getElementById(`laborLineTotal-${laborId}`).value) || 0;
                    
                    doc.text(laborName.substring(0, 50), 22, y);
                    doc.text(`$${lineTotal.toFixed(2)}`, 170, y);
                    
                    y += 6;
                    
                    if (y > 270) {
                        doc.addPage();
                        y = 20;
                    }
                });
                y += 5;
            }
            
            // Calculate total
            let total = 0;
            parts.forEach(partId => {
                total += parseFloat(document.getElementById(`lineTotal-${partId}`).value) || 0;
            });
            labor.forEach(laborId => {
                total += parseFloat(document.getElementById(`laborLineTotal-${laborId}`).value) || 0;
            });
            
            // Total
            y += 5;
            doc.setFont(undefined, 'bold');
            doc.setFontSize(14);
            doc.text(`TOTAL ESTIMATE: $${total.toFixed(2)}`, 190, y, { align: 'right' });
            
            // Footer
            doc.setFontSize(8);
            doc.setFont(undefined, 'italic');
            doc.text('Thank you for choosing Provo Body Shop!', 105, 285, { align: 'center' });
            
            // Save PDF
            doc.save(`Provo_Body_Shop_Estimate_${Date.now()}.pdf`);
        }

        // Add initial part and labor
        addPart();
        addLabor();
    </script>
</body>
</html>
