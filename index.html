<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provo Body Shop - Estimate/Invoice Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #434343 0%, #000000 100%);
            color: white;
            padding: 20px;
            position: relative;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-title {
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }
        .header-title h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .header-title p {
            font-size: 12px;
            opacity: 0.9;
        }
        .menu-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .menu-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        .menu-dropdown {
            display: none;
            position: absolute;
            top: 60px;
            left: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            min-width: 220px;
        }
        .menu-dropdown.show {
            display: block;
        }
        .menu-item {
            padding: 12px 20px;
            color: #333;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-item:hover {
            background: #f5f5f5;
        }
        .toggle-container {
            display: flex;
            gap: 5px;
            background: rgba(255,255,255,0.15);
            padding: 5px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .toggle-btn {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 13px;
        }
        .toggle-btn.active {
            background: white;
            color: #000;
        }
        .lang-selector {
            display: flex;
            gap: 5px;
            background: rgba(255,255,255,0.15);
            padding: 5px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .lang-btn {
            padding: 5px 10px;
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            font-size: 12px;
            font-weight: 500;
        }
        .lang-btn.active {
            background: white;
            color: #000;
        }
        .content {
            padding: 20px;
        }
        .section {
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 17px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #2c3e50;
        }
        .form-row {
            display: grid;
            gap: 10px;
            margin-bottom: 10px;
        }
        .form-row-2 {
            grid-template-columns: 1fr 1fr;
        }
        .form-row-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 13px;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #2c3e50;
            box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 70px;
            font-family: inherit;
        }
        .vehicle-nav {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .vehicle-counter {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .vehicle-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-weight: 500;
        }
        .btn-primary {
            background: #2c3e50;
            color: white;
        }
        .btn-primary:hover {
            background: #1a252f;
        }
        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
        }
        .btn-secondary:hover {
            background: #d5dbdb;
        }
        .btn-success {
            background: #27ae60;
            color: white;
        }
        .btn-success:hover {
            background: #229954;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .add-vehicle-btn {
            width: 100%;
            margin-bottom: 20px;
            font-size: 15px;
            padding: 12px;
        }
        .parts-list,
        .labor-list {
            margin-top: 10px;
        }
        .part-item,
        .labor-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 8px;
            margin-bottom: 8px;
            align-items: end;
        }
        .labor-item {
            grid-template-columns: 3fr 1fr auto;
        }
        .remove-btn {
            padding: 10px;
            background: #fee2e2;
            color: #dc2626;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            font-weight: bold;
        }
        .remove-btn:hover {
            background: #fecaca;
        }
        .total-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 17px;
            font-weight: 600;
            color: #2c3e50;
        }
        .export-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 25px;
        }
        .export-btn {
            padding: 12px;
            font-size: 14px;
        }
        
        /* Preview Modal */
        .preview-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
        }
        .preview-content {
            background-color: #fff;
            margin: 2% auto;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            border-radius: 8px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .preview-close {
            color: #aaa;
            float: right;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            line-height: 20px;
        }
        .preview-close:hover {
            color: #000;
        }
        .preview-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #2c3e50;
        }
        .preview-section {
            margin-bottom: 25px;
        }
        .preview-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .preview-vehicle {
            border: 2px solid #2c3e50;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .preview-vehicle h4 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .preview-table {
            width: 100%;
            margin-bottom: 15px;
        }
        .preview-table td {
            padding: 5px 0;
        }
        .preview-table td:last-child {
            text-align: right;
        }
        .preview-subtotal {
            font-weight: 600;
            font-size: 16px;
            color: #2c3e50;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
        }
        .preview-grand-total {
            background: #f8f9fa;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
        }
        .preview-total-amount {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            text-align: right;
        }
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .container {
                box-shadow: none;
                border-radius: 0;
            }
            .header,
            .export-buttons,
            .add-vehicle-btn,
            .nav-buttons,
            .vehicle-nav,
            .menu-btn,
            .toggle-container,
            .lang-selector {
                display: none !important;
            }
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 15px;
            }
            .part-item,
            .labor-item {
                grid-template-columns: 1fr;
            }
            .part-item input,
            .labor-item input {
                font-size: 16px; /* Prevents zoom on iOS */
            }
            .form-row-2,
            .form-row-3 {
                grid-template-columns: 1fr;
            }
            .export-buttons {
                grid-template-columns: 1fr;
            }
            .header-top {
                justify-content: center;
            }
            .preview-content {
                width: 95%;
                padding: 15px;
                margin: 5% auto;
            }
            .nav-buttons {
                gap: 5px;
            }
            .btn {
                padding: 10px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <button class="menu-btn" onclick="toggleMenu()">☰</button>
                
                <div class="toggle-container">
                    <button class="toggle-btn active" data-type="estimate" onclick="setDocumentType('estimate')" data-lang-key="document_type_estimate">Estimate</button>
                    <button class="toggle-btn" data-type="invoice" onclick="setDocumentType('invoice')" data-lang-key="document_type_invoice">Invoice</button>
                </div>

                <div class="lang-selector">
                    <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
                    <button class="lang-btn" onclick="setLanguage('es')">ES</button>
                    <button class="lang-btn" onclick="setLanguage('ht')">HT</button>
                </div>
            </div>

            <div class="menu-dropdown" id="menuDropdown">
                <div class="menu-item" onclick="newInvoice()" data-lang-key="menu_new">📄 New Invoice</div>
                <div class="menu-item" onclick="loadCustomer()" data-lang-key="menu_load">📋 Load Customer</div>
                <div class="menu-item" onclick="openPartsLibrary()" data-lang-key="menu_parts">🔧 Parts Library</div>
                <div class="menu-item" onclick="saveDraft()" data-lang-key="menu_save">💾 Save Draft</div>
                <div class="menu-item" onclick="loadDraft()" data-lang-key="menu_load_draft">📂 Load Draft</div>
            </div>

            <div class="header-title">
                <h1 data-lang-key="business_name">Provo Body Shop</h1>
                <p><span data-lang-key="document_type_label">Estimate</span> <span id="invoiceNumber">#0001</span></p>
            </div>
        </div>

        <div class="content">
            <div class="section">
                <h2 class="section-title" data-lang-key="customer_info">Customer Information</h2>
                
                <div class="form-group">
                    <label data-lang-key="customer_name">Customer Name</label>
                    <input type="text" id="customerName" placeholder="John Smith">
                </div>
                
                <div class="form-row form-row-3">
                    <div class="form-group">
                        <label data-lang-key="customer_email">Email</label>
                        <input type="email" id="customerEmail" placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label data-lang-key="customer_phone">Phone</label>
                        <input type="tel" id="customerPhone" placeholder="649-123-4567">
                    </div>
                    <div class="form-group">
                        <label data-lang-key="estimate_date">Date</label>
                        <input type="date" id="estimateDate">
                    </div>
                </div>
                
                <div class="form-group">
                    <label data-lang-key="customer_address">Address</label>
                    <input type="text" id="customerAddress" placeholder="123 Main St, Provo">
                </div>
                
                <div class="form-group">
                    <label data-lang-key="work_overview">Work Overview</label>
                    <textarea id="workOverview" placeholder="Describe the work to be performed..."></textarea>
                </div>
            </div>

            <button class="btn btn-success add-vehicle-btn" onclick="addVehicle()" data-lang-key="add_vehicle">➕ Add Another Vehicle</button>

            <div class="vehicle-nav" id="vehicleNav">
                <div class="vehicle-counter" id="vehicleCounter">Vehicle 1 of 1</div>
                <div class="vehicle-title" id="vehicleTitle">-</div>
                <div class="nav-buttons">
                    <button class="btn btn-secondary" onclick="previousVehicle()" data-lang-key="prev_vehicle">← Prev</button>
                    <button class="btn btn-primary" onclick="previewInvoice()" data-lang-key="preview">Preview</button>
                    <button class="btn btn-danger" onclick="deleteVehicle()" data-lang-key="delete_vehicle">🗑️ Delete</button>
                    <button class="btn btn-secondary" onclick="nextVehicle()" data-lang-key="next_vehicle">Next →</button>
                </div>
            </div>

            <div class="section" id="vehicleSection">
                <h2 class="section-title" data-lang-key="vehicle_info">Vehicle Information</h2>
                
                <div class="form-row form-row-2">
                    <div class="form-group">
                        <label data-lang-key="vehicle_make">Make</label>
                        <input type="text" id="vehicleMake" placeholder="Toyota">
                    </div>
                    <div class="form-group">
                        <label data-lang-key="vehicle_model">Model</label>
                        <input type="text" id="vehicleModel" placeholder="Camry">
                    </div>
                </div>
                
                <div class="form-row form-row-2">
                    <div class="form-group">
                        <label data-lang-key="vehicle_year">Year</label>
                        <input type="text" id="vehicleYear" placeholder="2020">
                    </div>
                    <div class="form-group">
                        <label data-lang-key="vehicle_number">Number / License</label>
                        <input type="text" id="vehicleNumber" placeholder="ABC-1234">
                    </div>
                </div>

                <h3 class="section-title" data-lang-key="parts">Parts</h3>
                <div id="partsList" class="parts-list"></div>
                <button class="btn btn-primary" onclick="addPart()" data-lang-key="add_part">+ Add Part</button>

                <h3 class="section-title" style="margin-top: 20px;" data-lang-key="labor">Labor</h3>
                <div id="laborList" class="labor-list"></div>
                <button class="btn btn-primary" onclick="addLabor()" data-lang-key="add_labor">+ Add Labor</button>

                <div class="total-section">
                    <div class="total-row">
                        <span data-lang-key="subtotal">Subtotal:</span>
                        <span id="vehicleTotal">$0.00</span>
                    </div>
                </div>
            </div>

            <div class="export-buttons">
                <button class="btn btn-primary export-btn" onclick="exportPDF()" data-lang-key="export_pdf">📄 PDF</button>
                <button class="btn btn-primary export-btn" onclick="exportJPG()" data-lang-key="export_jpg">🖼️ JPG</button>
                <button class="btn btn-primary export-btn" onclick="printInvoice()" data-lang-key="export_print">🖨️ Print</button>
                <button class="btn btn-primary export-btn" onclick="emailInvoice()" data-lang-key="export_email">📧 Email</button>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="preview-modal">
        <div class="preview-content">
            <span class="preview-close" onclick="closePreview()">&times;</span>
            <div id="previewBody"></div>
        </div>
    </div>

    <script>
const translations = {

let currentLanguage = 'en';
let documentType = 'estimate';
let currentVehicleIndex = 0;
let vehicles = [{ year: '', make: '', model: '', number: '', parts: [], labor: [] }];

function formatCurrency(amount) {
    return '$' + amount.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
}

document.addEventListener('DOMContentLoaded', function() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('estimateDate').value = today;
    loadVehicle(0);
    updateTranslations();
    updateInvoiceNumber();
});

function setLanguage(lang) {
    currentLanguage = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    updateTranslations();
    localStorage.setItem('language', lang);
}

function updateTranslations() {
    const trans = translations[currentLanguage];
    document.querySelectorAll('[data-lang-key]').forEach(element => {
        const key = element.getAttribute('data-lang-key');
        if (trans[key]) {
            if (element.tagName === 'INPUT' || element.tagName === 'TEXTAREA') {
                element.placeholder = trans[key];
            } else {
                element.textContent = trans[key];
            }
        }
    });
}

function setDocumentType(type) {
    documentType = type;
    document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    const trans = translations[currentLanguage];

function updateInvoiceNumber() {

function newInvoice() {

function loadCustomer() {
    const saved = localStorage.getItem('customers');
    if (!saved) {

        toggleMenu();

    }
    const customers = JSON.parse(saved);
    let list = 'Saved Customers:\n\n';
    customers.forEach((c, i) => {
        list += `${i + 1}. ${c.name} - ${c.phone}\n`;
    });
    const choice = prompt(list + '\nEnter customer number to load:');
    if (choice && customers[parseInt(choice) - 1]) {

        document.getElementById('customerName').value = c.name;
        document.getElementById('customerEmail').value = c.email;
        document.getElementById('customerPhone').value = c.phone;
        document.getElementById('customerAddress').value = c.address;

function saveDraft() {
    saveCurrentVehicle();
    const draft = {
        customer: {
            name: document.getElementById('customerName').value,
            email: document.getElementById('customerEmail').value,
            phone: document.getElementById('customerPhone').value,
            address: document.getElementById('customerAddress').value,
            date: document.getElementById('estimateDate').value,
            workOverview: document.getElementById('workOverview').value
        },
        vehicles: vehicles,
        documentType: documentType,
        language: currentLanguage
    };
    localStorage.setItem('invoiceDraft', JSON.stringify(draft));
    
    const customer = {
        name: draft.customer.name,
        email: draft.customer.email,
        phone: draft.customer.phone,
        address: draft.customer.address
    };
    let customers = JSON.parse(localStorage.getItem('customers') || '[]');
    const existing = customers.findIndex(c => c.phone === customer.phone);
    if (existing >= 0) customers[existing] = customer;
    else customers.push(customer);
    localStorage.setItem('customers', JSON.stringify(customers));
    
    alert('Draft saved successfully!');
    toggleMenu();
}

function loadDraft() {
    const draft = localStorage.getItem('invoiceDraft');
    if (draft) {
        const data = JSON.parse(draft);
        document.getElementById('customerName').value = data.customer.name;
        document.getElementById('customerEmail').value = data.customer.email;
        document.getElementById('customerPhone').value = data.customer.phone;
        document.getElementById('customerAddress').value = data.customer.address;
        document.getElementById('estimateDate').value = data.customer.date;
        document.getElementById('workOverview').value = data.customer.workOverview;
        vehicles = data.vehicles;
        documentType = data.documentType;
        currentLanguage = data.language;
        loadVehicle(0);
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent.toLowerCase() === currentLanguage);
        });
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-type') === documentType);
        });

}

function addVehicle() {
    saveCurrentVehicle();
    vehicles.push({ year: '', make: '', model: '', number: '', parts: [], labor: [] });
    currentVehicleIndex = vehicles.length - 1;
    loadVehicle(currentVehicleIndex);
}

function deleteVehicle() {
    if (vehicles.length === 1) {
        alert('Cannot delete the last vehicle. At least one vehicle is required.');
        return;
    }
    if (confirm('Are you sure you want to delete this vehicle?')) {
        vehicles.splice(currentVehicleIndex, 1);
        if (currentVehicleIndex >= vehicles.length) {
            currentVehicleIndex = vehicles.length - 1;
        }
        loadVehicle(currentVehicleIndex);
    }
}

function previousVehicle() {
    if (currentVehicleIndex > 0) {
        saveCurrentVehicle();
        currentVehicleIndex--;
        loadVehicle(currentVehicleIndex);
    }
}

function nextVehicle() {
    if (currentVehicleIndex < vehicles.length - 1) {
        saveCurrentVehicle();
        currentVehicleIndex++;
        loadVehicle(currentVehicleIndex);
    }
}

function saveCurrentVehicle() {
    const vehicle = vehicles[currentVehicleIndex];
    vehicle.year = document.getElementById('vehicleYear').value;
    vehicle.make = document.getElementById('vehicleMake').value;
    vehicle.model = document.getElementById('vehicleModel').value;
    vehicle.number = document.getElementById('vehicleNumber').value;
    
    vehicle.parts = [];
    document.querySelectorAll('.part-item').forEach(item => {
        const name = item.querySelector('[data-field="partName"]').value;
        const quantity = parseFloat(item.querySelector('[data-field="quantity"]').value) || 0;
        const price = parseFloat(item.querySelector('[data-field="price"]').value) || 0;
        if (name || quantity || price) {
            vehicle.parts.push({ name, quantity, price });
            savePartToLibrary(name, price);
        }
    });
    
    vehicle.labor = [];
    document.querySelectorAll('.labor-item').forEach(item => {
        const description = item.querySelector('[data-field="laborDesc"]').value;
        const cost = parseFloat(item.querySelector('[data-field="laborCost"]').value) || 0;
        if (description || cost) {
            vehicle.labor.push({ description, cost });
        }
    });
}

function savePartToLibrary(name, price) {
    if (!name || !price) return;
    let library = JSON.parse(localStorage.getItem('partsLibrary') || '[]');
    const existing = library.findIndex(p => p.name.toLowerCase() === name.toLowerCase());
    if (existing >= 0) library[existing].price = price;
    else library.push({ name, price });
    localStorage.setItem('partsLibrary', JSON.stringify(library));
}

function loadVehicle(index) {
    const vehicle = vehicles[index];
    document.getElementById('vehicleYear').value = vehicle.year || '';
    document.getElementById('vehicleMake').value = vehicle.make || '';
    document.getElementById('vehicleModel').value = vehicle.model || '';
    document.getElementById('vehicleNumber').value = vehicle.number || '';
    
    document.getElementById('vehicleCounter').textContent = `Vehicle ${index + 1} of ${vehicles.length}`;
    const title = vehicle.year && vehicle.make && vehicle.model 
        ? `${vehicle.year} ${vehicle.make} ${vehicle.model}` : '-';
    document.getElementById('vehicleTitle').textContent = title;
    
    const partsList = document.getElementById('partsList');
    partsList.innerHTML = '';
    if (vehicle.parts.length === 0) addPart();
    else vehicle.parts.forEach(part => addPart(part));
    
    const laborList = document.getElementById('laborList');
    laborList.innerHTML = '';
    if (vehicle.labor.length === 0) addLabor();
    else vehicle.labor.forEach(labor => addLabor(labor));
    
    calculateVehicleTotal();
}

function addPart(data = {}) {
    const trans = translations[currentLanguage];
    const partsList = document.getElementById('partsList');
    const partItem = document.createElement('div');
    partItem.className = 'part-item';
    partItem.innerHTML = `
        <div><input type="text" data-field="partName" value="${data.name || ''}" 
            placeholder="${trans.part_name}" oninput="calculateVehicleTotal()"></div>
        <div><input type="number" data-field="quantity" value="${data.quantity || 1}" 
            placeholder="${trans.quantity}" step="1" min="0" oninput="calculateVehicleTotal()"></div>
        <div><input type="number" data-field="price" value="${data.price || ''}" 
            placeholder="${trans.unit_price}" step="0.01" min="0" oninput="calculateVehicleTotal()"></div>
        <button class="remove-btn" onclick="removePart(this)">×</button>
    `;
    partsList.appendChild(partItem);
}

function removePart(btn) {
    if (document.querySelectorAll('.part-item').length > 1) {
        btn.parentElement.remove();
        calculateVehicleTotal();
    }
}

function addLabor(data = {}) {
    const trans = translations[currentLanguage];
    const laborList = document.getElementById('laborList');
    const laborItem = document.createElement('div');
    laborItem.className = 'labor-item';
    laborItem.innerHTML = `
        <div><input type="text" data-field="laborDesc" value="${data.description || ''}" 
            placeholder="${trans.description}" oninput="calculateVehicleTotal()"></div>
        <div><input type="number" data-field="laborCost" value="${data.cost || ''}" 
            placeholder="${trans.cost}" step="0.01" min="0" oninput="calculateVehicleTotal()"></div>
        <button class="remove-btn" onclick="removeLabor(this)">×</button>
    `;
    laborList.appendChild(laborItem);
}

function removeLabor(btn) {
    if (document.querySelectorAll('.labor-item').length > 1) {
        btn.parentElement.remove();
        calculateVehicleTotal();
    }
}

function calculateVehicleTotal() {
    let total = 0;
    document.querySelectorAll('.part-item').forEach(item => {
        const quantity = parseFloat(item.querySelector('[data-field="quantity"]').value) || 0;
        const price = parseFloat(item.querySelector('[data-field="price"]').value) || 0;
        total += quantity * price;
    });
    document.querySelectorAll('.labor-item').forEach(item => {
        const cost = parseFloat(item.querySelector('[data-field="laborCost"]').value) || 0;
        total += cost;
    });
    document.getElementById('vehicleTotal').textContent = formatCurrency(total);
}

function calculateGrandTotal() {
    saveCurrentVehicle();
    let grandTotal = 0;
    vehicles.forEach(vehicle => {
        vehicle.parts.forEach(part => {
            grandTotal += part.quantity * part.price;
        });
        vehicle.labor.forEach(labor => {
            grandTotal += labor.cost;
        });
    });
    return grandTotal;
}

                <td style="font-size: 24px; font-weight: bold;"><strong>${totalLabel.toUpperCase()}:</strong></td>
                <td style="text-align: right; font-size: 24px; font-weight: bold; color: #2c3e50;">${formatCurrency(grandTotal)}</td>
            </tr></table>
        </div>
    `;
    
    exportDiv.innerHTML = html;
    document.body.appendChild(exportDiv);
    
    const canvas = await html2canvas(exportDiv, {
        scale: 2,
        backgroundColor: '#ffffff'
    });
    
    document.body.removeChild(exportDiv);
    
    const link = document.createElement('a');
    link.download = `${documentType}_${document.getElementById('invoiceNumber').textContent}_${document.getElementById('customerName').value.replace(/\s+/g, '_')}.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
}

function printInvoice() {
    saveCurrentVehicle();
    
    const trans = translations[currentLanguage];
    const docLabel = documentType === 'estimate' ? trans.document_type_estimate : trans.document_type_invoice;
    const totalLabel = documentType === 'estimate' ? trans.total_estimate : trans.total_invoice;
    
    let printContent = `
        <div style="text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #000;">
            <h1>${trans.business_name}</h1>
            <p>${trans.business_tagline}</p>
            <p>Gary Lawrence | 649-442-3615</p>
            <p>danielgarylawrence123@gmail.com</p>
            <p>Norway Drive Kewtown, Providenciales, Turk and Caicos Islands</p>
            <h2 style="margin-top: 20px;">${docLabel} ${document.getElementById('invoiceNumber').textContent}</h2>
            <p>${trans.estimate_date}: ${document.getElementById('estimateDate').value}</p>
        </div>
        
        <div style="margin-bottom: 20px;">
            <h3>${trans.customer_info}</h3>
            <p><strong>${trans.customer_name}:</strong> ${document.getElementById('customerName').value}</p>
            <p><strong>${trans.customer_email}:</strong> ${document.getElementById('customerEmail').value}</p>
            <p><strong>${trans.customer_phone}:</strong> ${document.getElementById('customerPhone').value}</p>
            <p><strong>${trans.customer_address}:</strong> ${document.getElementById('customerAddress').value}</p>
        </div>
    `;
    
    const workOverview = document.getElementById('workOverview').value;
    if (workOverview) {
        printContent += `
            <div style="margin-bottom: 20px;">
                <h3>${trans.work_overview}</h3>
                <p>${workOverview}</p>
            </div>
        `;
    }
    
    vehicles.forEach((vehicle) => {
        let vehicleTotal = 0;
        printContent += `<div style="border: 2px solid #000; padding: 20px; margin-bottom: 20px;">
            <h4>${vehicle.year} ${vehicle.make} ${vehicle.model}</h4>
            <p><strong>${trans.vehicle_number}:</strong> ${vehicle.number}</p>`;
        
        if (vehicle.parts.length > 0) {
            printContent += `<h5 style="margin-top: 15px;">${trans.parts}</h5><table style="width: 100%;">`;
            vehicle.parts.forEach(part => {
                const lineTotal = part.quantity * part.price;
                vehicleTotal += lineTotal;
                printContent += `<tr><td>${part.name}</td><td style="text-align: center;">Qty: ${part.quantity}</td><td style="text-align: right;">${formatCurrency(lineTotal)}</td></tr>`;
            });
            printContent += '</table>';
        }
        
        if (vehicle.labor.length > 0) {
            printContent += `<h5 style="margin-top: 15px;">${trans.labor}</h5><table style="width: 100%;">`;
            vehicle.labor.forEach(labor => {
                vehicleTotal += labor.cost;
                printContent += `<tr><td>${labor.description}</td><td style="text-align: right;">${formatCurrency(labor.cost)}</td></tr>`;
            });
            printContent += '</table>';
        }
        
        printContent += `<div style="font-weight: bold; margin-top: 10px; padding-top: 10px; border-top: 1px solid #000;">
            ${trans.subtotal.toUpperCase()}: ${formatCurrency(vehicleTotal)}
        </div></div>`;
    });
    
    const grandTotal = calculateGrandTotal();
    printContent += `
        <div style="background: #f0f0f0; padding: 20px; margin-top: 20px;">
            <div style="font-size: 20px; font-weight: bold; text-align: right;">
                ${totalLabel.toUpperCase()}: ${formatCurrency(grandTotal)}
            </div>
        </div>
    `;
    
    const printWindow = window.open('', '', 'height=600,width=800');
    printWindow.document.write('<html><head><title>Print</title>');
    printWindow.document.write('<style>body{font-family: Arial, sans-serif; padding: 20px;} table{border-collapse: collapse; margin: 10px 0;} td{padding: 5px 0;}</style>');
    printWindow.document.write('</head><body>');
    printWindow.document.write(printContent);
    printWindow.document.write('</body></html>');
    printWindow.document.close();
    printWindow.print();
}

function emailInvoice() {
    saveCurrentVehicle();
    const customerEmail = document.getElementById('customerEmail').value;
    const customerName = document.getElementById('customerName').value;
    const invoiceNum = document.getElementById('invoiceNumber').textContent;
    const docLabel = documentType === 'estimate' ? 'Estimate' : 'Invoice';
    
    const subject = encodeURIComponent(`${docLabel} ${invoiceNum} from Provo Body Shop`);
    const body = encodeURIComponent(`Dear ${customerName},\n\nPlease find your ${documentType} attached.\n\nThank you for choosing Provo Body Shop!\n\nGary Lawrence\n649-442-3615\ndanielgarylawrence123@gmail.com`);
    
    const mailtoLink = `mailto:${customerEmail}?subject=${subject}&body=${body}`;
    window.location.href = mailtoLink;
    
    alert('Please attach the PDF to the email before sending.');
}
