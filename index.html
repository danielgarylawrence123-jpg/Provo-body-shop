<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provo Body Shop - Estimate/Invoice Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --navy: #0a1628;
            --navy-mid: #0f2044;
            --blue-dark: #1a3a6b;
            --blue-mid: #1e4d8c;
            --blue: #2563ab;
            --blue-light: #3b82cc;
            --blue-pale: #dbeafe;
            --blue-accent: #60a5fa;
            --white: #ffffff;
            --off-white: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-400: #94a3b8;
            --gray-600: #475569;
            --gray-800: #1e293b;
            --black: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, #000000 100%);
            min-height: 100vh;
            padding: 10px;
        }

        /* ── APP SHELL ── */
        .app-container {
            max-width: 960px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* ── APP HEADER (controls only - not printed) ── */
        .app-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--blue-dark) 100%);
            padding: 18px 20px 14px;
            position: relative;
        }
        .app-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .app-title-block {
            text-align: center;
            width: 100%;
            margin-bottom: 12px;
        }
        .app-title {
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .app-title span { color: var(--blue-accent); }
        .app-subtitle {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
            font-family: 'Inter', sans-serif;
        }
        .app-catchphrase {
            margin-top: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.75);
            letter-spacing: 0.5px;
        }
        .app-catchphrase em {
            font-style: normal;
            color: var(--blue-accent);
            font-weight: 800;
        }
        .app-controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 10px;
        }
        .app-right-controls {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .menu-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 13px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.22); }

        .menu-dropdown {
            display: none;
            position: absolute;
            top: 58px;
            left: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            z-index: 1000;
            min-width: 220px;
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }
        .menu-dropdown.show { display: block; }
        .menu-item {
            padding: 12px 18px;
            color: var(--gray-800);
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid var(--gray-100);
            font-size: 14px;
            font-weight: 500;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: var(--blue-pale); color: var(--blue-dark); }

        .toggle-container {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.12);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .toggle-btn {
            padding: 7px 14px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 12px;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.5px;
        }
        .toggle-btn.active { background: white; color: var(--navy); }

        .lang-selector {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.12);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .lang-btn {
            padding: 5px 9px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
        }
        .lang-btn.active { background: white; color: var(--navy); }

        /* ── FORM AREA ── */
        .content { padding: 24px; }
        .section { margin-bottom: 24px; }
        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--blue-dark);
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--blue-pale);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-row { display: grid; gap: 10px; margin-bottom: 10px; }
        .form-row-2 { grid-template-columns: 1fr 1fr; }
        .form-row-3 { grid-template-columns: 1fr 1fr 1fr; }
        .form-group { margin-bottom: 10px; }
        label {
            display: block;
            margin-bottom: 4px;
            color: var(--gray-600);
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="text"], input[type="email"], input[type="tel"],
        input[type="date"], input[type="number"], textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--gray-200);
            border-radius: 7px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--gray-800);
            background: var(--off-white);
            transition: all 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 171, 0.1);
        }
        textarea { resize: vertical; min-height: 70px; }

        /* ── VEHICLE NAV ── */
        .vehicle-nav {
            background: linear-gradient(135deg, var(--navy) 0%, var(--blue-dark) 100%);
            padding: 14px 18px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        .vehicle-counter {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--blue-accent);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .vehicle-title {
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-bottom: 12px;
        }
        .nav-buttons { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }

        /* ── BUTTONS ── */
        .btn {
            padding: 9px 16px;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
            letter-spacing: 0.2px;
        }
        .btn-primary { background: var(--blue); color: white; }
        .btn-primary:hover { background: var(--blue-dark); transform: translateY(-1px); }
        .btn-secondary { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.25); }
        .btn-secondary:hover { background: rgba(255,255,255,0.25); }
        .btn-success { background: #059669; color: white; }
        .btn-success:hover { background: #047857; transform: translateY(-1px); }
        .btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background: rgba(239,68,68,0.25); }

        .add-vehicle-btn { width: 100%; margin-bottom: 20px; font-size: 14px; padding: 12px; }

        /* ── PARTS / LABOR ── */
        .parts-list, .labor-list { margin-top: 10px; }
        .part-item, .labor-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 8px;
            margin-bottom: 8px;
            align-items: end;
        }
        .labor-item { grid-template-columns: 3fr 1fr auto; }
        .remove-btn {
            padding: 10px 12px;
            background: #fee2e2;
            color: #dc2626;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .remove-btn:hover { background: #fecaca; }

        .total-section {
            background: linear-gradient(135deg, var(--navy) 0%, var(--blue-dark) 100%);
            padding: 14px 18px;
            border-radius: 10px;
            margin-top: 16px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 700;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }
        .total-row span:last-child { color: var(--blue-accent); }

        .export-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 24px;
        }
        .export-btn {
            padding: 13px;
            font-size: 14px;
            background: linear-gradient(135deg, var(--navy) 0%, var(--blue-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .export-btn:hover { background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(37,99,171,0.35); }
        .export-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ══════════════════════════════════════
           PROFESSIONAL INVOICE PREVIEW STYLES
        ══════════════════════════════════════ */
        .preview-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            overflow: auto;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
        }
        .preview-content {
            background: white;
            margin: 2% auto;
            width: 90%;
            max-width: 820px;
            border-radius: 12px;
            max-height: 94vh;
            overflow-y: auto;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }
        .preview-close-bar {
            background: var(--navy);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px 12px 0 0;
        }
        .preview-close-bar span {
            color: var(--blue-accent);
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .preview-close {
            color: rgba(255,255,255,0.6);
            font-size: 26px;
            font-weight: 300;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }
        .preview-close:hover { color: white; }

        /* THE INVOICE DOCUMENT */
        #invoiceDocument {
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--gray-800);
        }

        /* Invoice Header Band */
        .inv-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--blue-mid) 60%, var(--blue) 100%);
            padding: 36px 40px 28px;
            position: relative;
            overflow: hidden;
        }
        .inv-header::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
        }
        .inv-header::after {
            content: '';
            position: absolute;
            bottom: -60px; right: 80px;
            width: 150px; height: 150px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
        }
        .inv-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .inv-company-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            line-height: 1;
        }
        .inv-company-tagline {
            font-size: 12px;
            color: var(--blue-accent);
            margin-top: 5px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .inv-catchphrase {
            margin-top: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.3px;
        }
        .inv-catchphrase em {
            font-style: normal;
            color: white;
            font-weight: 800;
        }
        .inv-doc-badge {
            text-align: right;
        }
        .inv-doc-type {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
            line-height: 1;
            text-transform: uppercase;
        }
        .inv-doc-number {
            font-size: 14px;
            color: var(--blue-accent);
            margin-top: 4px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .inv-doc-date {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 3px;
        }

        /* Blue divider bar */
        .inv-divider {
            height: 4px;
            background: linear-gradient(90deg, var(--blue-accent) 0%, var(--blue-light) 50%, transparent 100%);
            margin-top: 24px;
        }

        /* Address section below header */
        .inv-address-row {
            display: flex;
            justify-content: space-between;
            padding: 28px 40px;
            background: var(--off-white);
            border-bottom: 1px solid var(--gray-200);
            gap: 30px;
        }
        .inv-from, .inv-to {
            flex: 1;
        }
        .inv-address-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .inv-address-content {
            font-size: 13px;
            line-height: 1.7;
            color: var(--gray-800);
        }
        .inv-address-content strong {
            font-size: 15px;
            font-weight: 700;
            color: var(--navy);
            display: block;
            margin-bottom: 2px;
        }

        /* Work overview band */
        .inv-overview {
            padding: 18px 40px;
            background: var(--blue-pale);
            border-left: 4px solid var(--blue);
            margin: 0 40px 0;
            border-radius: 0 6px 6px 0;
        }
        .inv-overview-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--blue-dark);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .inv-overview-text {
            font-size: 13px;
            color: var(--gray-800);
            line-height: 1.6;
        }

        /* Vehicle section */
        .inv-body { padding: 20px 40px; }

        .inv-vehicle-block {
            margin-bottom: 24px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .inv-vehicle-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--blue-dark) 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .inv-vehicle-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: white;
            letter-spacing: 0.3px;
        }
        .inv-vehicle-num {
            font-size: 12px;
            color: var(--blue-accent);
            font-weight: 500;
        }

        /* Table */
        .inv-table {
            width: 100%;
            border-collapse: collapse;
        }
        .inv-table-section-header {
            background: var(--gray-100);
            padding: 8px 20px;
        }
        .inv-table-section-header td {
            font-size: 10px;
            font-weight: 700;
            color: var(--blue-dark);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .inv-table th {
            background: var(--blue-pale);
            padding: 9px 20px;
            font-size: 11px;
            font-weight: 700;
            color: var(--blue-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: left;
        }
        .inv-table th:last-child { text-align: right; }
        .inv-table th:nth-child(2),
        .inv-table th:nth-child(3) { text-align: center; }
        .inv-table td {
            padding: 10px 20px;
            font-size: 13px;
            color: var(--gray-800);
            border-bottom: 1px solid var(--gray-100);
        }
        .inv-table td:last-child { font-weight: 600; }
        .inv-table td:nth-child(2),
        .inv-table td:nth-child(3) { text-align: center; color: var(--gray-600); }
        .inv-table tr:last-child td { border-bottom: none; }
        .inv-table tr:hover td { background: rgba(219,234,254,0.3); }

        .inv-labor-row td { color: var(--gray-700); }

        /* Vehicle subtotal row */
        .inv-subtotal-row {
            background: linear-gradient(90deg, var(--blue-pale) 0%, rgba(219,234,254,0.3) 100%);
            border-top: 2px solid var(--blue-light);
        }
        .inv-subtotal-row td {
            padding: 11px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--blue-dark) !important;
            border-bottom: none !important;
        }

        /* Grand total footer */
        .inv-footer {
            background: linear-gradient(135deg, var(--navy) 0%, var(--blue-dark) 100%);
            padding: 0 40px 30px;
        }
        .inv-vehicle-summary {
            padding: 20px 0 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 16px;
        }
        .inv-summary-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }
        .inv-summary-row span:last-child { font-weight: 600; color: rgba(255,255,255,0.9); }
        .inv-grand-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 4px;
        }
        .inv-grand-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255,255,255,0.85);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .inv-grand-amount {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
        }
        .inv-grand-accent {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, var(--blue-accent), transparent);
            margin-top: 6px;
        }

        /* Disclaimer */
        .inv-disclaimer {
            padding: 18px 40px;
            background: var(--gray-100);
            border-top: 2px solid var(--blue-pale);
            position: relative;
        }
        .inv-disclaimer-title {
            font-size: 9px;
            font-weight: 800;
            color: var(--blue-dark);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
            font-family: 'Montserrat', sans-serif;
        }
        .inv-disclaimer-text {
            font-size: 9px;
            color: var(--gray-600);
            line-height: 1.6;
            text-align: left;
        }
        .inv-disclaimer-footer {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--gray-200);
            font-size: 9px;
            color: var(--gray-400);
            text-align: center;
            font-style: italic;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .content { padding: 15px; }
            .part-item, .labor-item { grid-template-columns: 1fr; }
            .form-row-2, .form-row-3 { grid-template-columns: 1fr; }
            .export-buttons { grid-template-columns: 1fr; }
            .inv-header { padding: 24px 20px 20px; }
            .inv-header-top { flex-direction: column; gap: 12px; }
            .inv-doc-badge { text-align: left; }
            .inv-address-row { flex-direction: column; padding: 20px; }
            .inv-overview { margin: 0 20px; padding: 14px 16px; }
            .inv-body { padding: 16px 20px; }
            .inv-footer { padding: 0 20px 24px; }
            .inv-grand-amount { font-size: 24px; }
        }

        @media print {
            body { background: white; padding: 0; }
            .app-container { box-shadow: none; border-radius: 0; }
            .app-header, .content, .export-buttons { display: none !important; }
        }
    </style>
</head>
<body>
<div class="app-container">

    <!-- APP CONTROLS (not printed) -->
    <div class="app-header">
        <!-- Centered Title -->
        <div class="app-title-block">
            <div class="app-title">Provo Body <span>Shop</span></div>
            <div class="app-subtitle">Professional Auto Body Repair</div>
            <div class="app-catchphrase">We take the <em>DENT</em> out of the <em>ACCIDENT</em></div>
        </div>

let currentLanguage = 'en';
let documentType = 'estimate';
let currentVehicleIndex = 0;
let vehicles = [{ year:'', make:'', model:'', number:'', parts:[], labor:[] }];

function fmt(n) {
    return '$' + n.toFixed(2).replace(/\d(?=(\d{3})+\.)/g,'$&,');
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('estimateDate').value = new Date().toISOString().split('T')[0];
    loadVehicle(0);
    updateTranslations();
    updateInvoiceNumber();
});

function setLanguage(lang) {
    currentLanguage = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    updateTranslations();
    localStorage.setItem('language', lang);
}

function updateTranslations() {
    const t = translations[currentLanguage];
    document.querySelectorAll('[data-lang-key]').forEach(el => {
        const k = el.getAttribute('data-lang-key');
        if (t[k]) el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' ? el.placeholder = t[k] : el.textContent = t[k];
    });
}

function setDocumentType(type) {
    documentType = type;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    localStorage.setItem('documentType', type);
}

function toggleMenu() { document.getElementById('menuDropdown').classList.toggle('show'); }

document.addEventListener('click', e => {
    const menu = document.getElementById('menuDropdown');
    const btn = document.querySelector('.menu-btn');
    if (!menu.contains(e.target) && !btn.contains(e.target)) menu.classList.remove('show');
});

function updateInvoiceNumber() {
    const num = parseInt(localStorage.getItem('invoiceNumber') || '1');
    document.getElementById && (window._invNum = '#' + String(num).padStart(4,'0'));
}

function newInvoice() {
    if (!confirm('Start a new invoice? Current data will be lost.')) { toggleMenu(); return; }
    vehicles = [{ year:'', make:'', model:'', number:'', parts:[], labor:[] }];
    currentVehicleIndex = 0;
    ['customerName','customerEmail','customerPhone','customerAddress','workOverview'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('estimateDate').value = new Date().toISOString().split('T')[0];
    loadVehicle(0);
    let n = parseInt(localStorage.getItem('invoiceNumber') || '1') + 1;
    localStorage.setItem('invoiceNumber', n);
    window._invNum = '#' + String(n).padStart(4,'0');
    toggleMenu();
}

function loadCustomer() {
    const saved = localStorage.getItem('customers');
    if (!saved) { alert('No saved customers found!'); toggleMenu(); return; }
    const customers = JSON.parse(saved);
    let list = 'Saved Customers:\n\n';
    customers.forEach((c,i) => list += `${i+1}. ${c.name} - ${c.phone}\n`);
    const choice = prompt(list + '\nEnter customer number to load:');
    if (choice && customers[parseInt(choice)-1]) {
        const c = customers[parseInt(choice)-1];
        document.getElementById('customerName').value = c.name;
        document.getElementById('customerEmail').value = c.email;
        document.getElementById('customerPhone').value = c.phone;
        document.getElementById('customerAddress').value = c.address;
    }
    toggleMenu();
}

function openPartsLibrary() {
    const saved = localStorage.getItem('partsLibrary');
    if (!saved) { alert('Parts Library is empty.'); toggleMenu(); return; }
    const parts = JSON.parse(saved);
    let list = 'Parts Library:\n\n';
    parts.forEach((p,i) => list += `${i+1}. ${p.name} - ${fmt(p.price)}\n`);
    alert(list); toggleMenu();
}

function saveDraft() {
    saveCurrentVehicle();
    const draft = {
        customer: {
            name: document.getElementById('customerName').value,
            email: document.getElementById('customerEmail').value,
            phone: document.getElementById('customerPhone').value,
            address: document.getElementById('customerAddress').value,
            date: document.getElementById('estimateDate').value,
            workOverview: document.getElementById('workOverview').value
        },
        vehicles, documentType, language: currentLanguage
    };
    localStorage.setItem('invoiceDraft', JSON.stringify(draft));
    let customers = JSON.parse(localStorage.getItem('customers') || '[]');
    const ci = customers.findIndex(c => c.phone === draft.customer.phone);
    ci >= 0 ? customers[ci] = draft.customer : customers.push(draft.customer);
    localStorage.setItem('customers', JSON.stringify(customers));
    alert('Draft saved!'); toggleMenu();
}

function loadDraft() {
    const draft = localStorage.getItem('invoiceDraft');
    if (!draft) { alert('No draft found!'); toggleMenu(); return; }
    const d = JSON.parse(draft);
    document.getElementById('customerName').value = d.customer.name;
    document.getElementById('customerEmail').value = d.customer.email;
    document.getElementById('customerPhone').value = d.customer.phone;
    document.getElementById('customerAddress').value = d.customer.address;
    document.getElementById('estimateDate').value = d.customer.date;
    document.getElementById('workOverview').value = d.customer.workOverview;
    vehicles = d.vehicles; documentType = d.documentType; currentLanguage = d.language;
    loadVehicle(0);
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === currentLanguage));
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-type') === documentType));
    updateTranslations(); alert('Draft loaded!'); toggleMenu();
}

function addVehicle() { saveCurrentVehicle(); vehicles.push({ year:'', make:'', model:'', number:'', parts:[], labor:[] }); currentVehicleIndex = vehicles.length-1; loadVehicle(currentVehicleIndex); }
function deleteVehicle() {
    if (vehicles.length === 1) { alert('Cannot delete the last vehicle.'); return; }
    if (confirm('Delete this vehicle?')) { vehicles.splice(currentVehicleIndex,1); if (currentVehicleIndex >= vehicles.length) currentVehicleIndex = vehicles.length-1; loadVehicle(currentVehicleIndex); }
}
function previousVehicle() { if (currentVehicleIndex > 0) { saveCurrentVehicle(); currentVehicleIndex--; loadVehicle(currentVehicleIndex); } }
function nextVehicle() { if (currentVehicleIndex < vehicles.length-1) { saveCurrentVehicle(); currentVehicleIndex++; loadVehicle(currentVehicleIndex); } }

function saveCurrentVehicle() {
    const v = vehicles[currentVehicleIndex];
    v.year = document.getElementById('vehicleYear').value;
    v.make = document.getElementById('vehicleMake').value;
    v.model = document.getElementById('vehicleModel').value;
    v.number = document.getElementById('vehicleNumber').value;
    v.parts = [];
    document.querySelectorAll('.part-item').forEach(item => {
        const name = item.querySelector('[data-field="partName"]').value;
        const qty = parseFloat(item.querySelector('[data-field="quantity"]').value) || 0;
        const price = parseFloat(item.querySelector('[data-field="price"]').value) || 0;
        if (name || qty || price) { v.parts.push({name,qty,price}); savePartLib(name,price); }
    });
    v.labor = [];
    document.querySelectorAll('.labor-item').forEach(item => {
        const desc = item.querySelector('[data-field="laborDesc"]').value;
        const cost = parseFloat(item.querySelector('[data-field="laborCost"]').value) || 0;
        if (desc || cost) v.labor.push({description:desc, cost});
    });
}

function savePartLib(name, price) {
    if (!name || !price) return;
    let lib = JSON.parse(localStorage.getItem('partsLibrary') || '[]');
    const i = lib.findIndex(p => p.name.toLowerCase() === name.toLowerCase());
    i >= 0 ? lib[i].price = price : lib.push({name,price});
    localStorage.setItem('partsLibrary', JSON.stringify(lib));
}

function loadVehicle(index) {
    const v = vehicles[index];
    document.getElementById('vehicleYear').value = v.year || '';
    document.getElementById('vehicleMake').value = v.make || '';
    document.getElementById('vehicleModel').value = v.model || '';
    document.getElementById('vehicleNumber').value = v.number || '';
    document.getElementById('vehicleCounter').textContent = `VEHICLE ${index+1} OF ${vehicles.length}`;
    document.getElementById('vehicleTitle').textContent = (v.year && v.make && v.model) ? `${v.year} ${v.make} ${v.model}` : '—';
    const pl = document.getElementById('partsList'); pl.innerHTML = '';
    v.parts.length === 0 ? addPart() : v.parts.forEach(p => addPart(p));
    const ll = document.getElementById('laborList'); ll.innerHTML = '';
    v.labor.length === 0 ? addLabor() : v.labor.forEach(l => addLabor(l));
    calcTotal();
}

function addPart(data={}) {
    const t = translations[currentLanguage];
    const el = document.createElement('div'); el.className = 'part-item';
    el.innerHTML = `
        <div><input type="text" data-field="partName" value="${data.name||''}" placeholder="${t.part_name}" oninput="calcTotal()"></div>
        <div><input type="number" data-field="quantity" value="${data.qty||1}" placeholder="${t.quantity}" step="1" min="0" oninput="calcTotal()"></div>
        <div><input type="number" data-field="price" value="${data.price||''}" placeholder="${t.unit_price}" step="0.01" min="0" oninput="calcTotal()"></div>
        <button class="remove-btn" onclick="removePart(this)">×</button>`;
    document.getElementById('partsList').appendChild(el);
}
function removePart(btn) { if (document.querySelectorAll('.part-item').length > 1) { btn.parentElement.remove(); calcTotal(); } }

function addLabor(data={}) {
    const t = translations[currentLanguage];
    const el = document.createElement('div'); el.className = 'labor-item';
    el.innerHTML = `
        <div><input type="text" data-field="laborDesc" value="${data.description||''}" placeholder="${t.description}" oninput="calcTotal()"></div>
        <div><input type="number" data-field="laborCost" value="${data.cost||''}" placeholder="${t.cost}" step="0.01" min="0" oninput="calcTotal()"></div>
        <button class="remove-btn" onclick="removeLabor(this)">×</button>`;
    document.getElementById('laborList').appendChild(el);
}
function removeLabor(btn) { if (document.querySelectorAll('.labor-item').length > 1) { btn.parentElement.remove(); calcTotal(); } }

function calcTotal() {
    let total = 0;
    document.querySelectorAll('.part-item').forEach(item => {
        total += (parseFloat(item.querySelector('[data-field="quantity"]').value)||0) * (parseFloat(item.querySelector('[data-field="price"]').value)||0);
    });
    document.querySelectorAll('.labor-item').forEach(item => {
        total += parseFloat(item.querySelector('[data-field="laborCost"]').value)||0;
    });
    document.getElementById('vehicleTotal').textContent = fmt(total);
}

function getGrandTotal() {
    saveCurrentVehicle();
    let grand = 0;
    vehicles.forEach(v => {
        v.parts.forEach(p => grand += p.qty * p.price);
        v.labor.forEach(l => grand += l.cost);
    });
    return grand;
}

function getVehicleTotal(v) {
    let t = 0;
    v.parts.forEach(p => t += p.qty * p.price);
    v.labor.forEach(l => t += l.cost);
    return t;
}

/* ── BUILD THE PROFESSIONAL INVOICE HTML ── */
function buildInvoiceHTML() {
    const t = translations[currentLanguage];
    const docLabel = documentType === 'estimate' ? t.document_type_estimate : t.document_type_invoice;
    const totalLabel = documentType === 'estimate' ? t.total_estimate : t.total_invoice;
    const invNum = window._invNum || ('#' + String(parseInt(localStorage.getItem('invoiceNumber')||'1')).padStart(4,'0'));
    const date = document.getElementById('estimateDate').value;
    const cName = document.getElementById('customerName').value;
    const cEmail = document.getElementById('customerEmail').value;
    const cPhone = document.getElementById('customerPhone').value;
    const cAddr = document.getElementById('customerAddress').value;
    const overview = document.getElementById('workOverview').value;
    const grand = getGrandTotal();

    let vehicleRows = '';
    vehicles.forEach((v, vi) => {
        const vTotal = getVehicleTotal(v);
        let partsRows = '';
        if (v.parts.length > 0) {
            partsRows += `<tr class="inv-table-section-header"><td colspan="4" style="text-align:left">PARTS</td></tr>
            <tr style="background:#dbeafe10"><th style="text-align:left">Description</th><th style="text-align:center">Qty</th><th style="text-align:center">Unit Price</th><th style="text-align:right">Total</th></tr>`;
            v.parts.forEach(p => {
                partsRows += `<tr><td style="text-align:left">${p.name||'—'}</td><td style="text-align:center">${p.qty}</td><td style="text-align:center">${fmt(p.price)}</td><td style="text-align:right;font-weight:600">${fmt(p.qty*p.price)}</td></tr>`;
            });
        }
        let laborRows = '';
        if (v.labor.length > 0) {
            laborRows += `<tr class="inv-table-section-header"><td colspan="4" style="text-align:left">LABOR</td></tr>
            <tr style="background:#dbeafe10"><th colspan="3" style="text-align:left">Description</th><th style="text-align:right">Amount</th></tr>`;
            v.labor.forEach(l => {
                laborRows += `<tr class="inv-labor-row"><td colspan="3" style="text-align:left">${l.description||'—'}</td><td style="text-align:right;font-weight:600">${fmt(l.cost)}</td></tr>`;
            });
        }
        vehicleRows += `
        <div class="inv-vehicle-block">

/* ── PDF EXPORT (uses professional layout data) ── */
/* ── SHARED RENDER: captures the exact same HTML+CSS as the preview ── */
async function renderInvoiceCanvas() {
    // Pull all <style> content from the page so the hidden div inherits identical CSS
    const allCSS = Array.from(document.styleSheets)
        .map(ss => { try { return Array.from(ss.cssRules).map(r => r.cssText).join('\n'); } catch(e){ return ''; } })
        .join('\n');

    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:fixed;left:-9999px;top:0;width:860px;background:white;z-index:-1;';

    // Inline the full stylesheet so CSS vars resolve correctly
    const styleEl = document.createElement('style');
    styleEl.textContent = allCSS + `
        /* FORCE DESKTOP LAYOUT - override mobile responsive CSS */
        .inv-header { padding: 36px 40px 28px !important; }
        .inv-header-top { 
            flex-direction: row !important; 
            justify-content: space-between !important;
            align-items: flex-start !important;
            gap: 0 !important;
        }
        .inv-doc-badge { text-align: right !important; }
        .inv-address-row { 
            flex-direction: row !important; 
            padding: 28px 40px !important; 
            gap: 30px !important;
        }
        .inv-body { padding: 20px 40px !important; }
        .inv-footer { padding: 0 40px 30px !important; }
        .inv-grand-amount { font-size: 32px !important; }
        .inv-overview { margin: 0 40px 0 !important; padding: 18px 40px !important; }
    `;
    wrapper.appendChild(styleEl);

    const inner = document.createElement('div');
    inner.innerHTML = buildInvoiceHTML();
    wrapper.appendChild(inner);

    document.body.appendChild(wrapper);

    // Wait a tick for layout + fonts
    await new Promise(r => setTimeout(r, 400));

    const canvas = await html2canvas(wrapper, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        allowTaint: true,
        width: 860,
        scrollX: 0,
        scrollY: 0
    });

    document.body.removeChild(wrapper);
    return canvas;
}

function getExportFilename(ext) {
    const invNum = (window._invNum || ('#' + String(parseInt(localStorage.getItem('invoiceNumber')||'1')).padStart(4,'0'))).replace('#','');
    const name = document.getElementById('customerName').value.replace(/\s+/g,'_') || 'customer';
    return `${documentType}_${invNum}_${name}.${ext}`;
}

/* ── PDF EXPORT ── */
async function exportPDF() {
    saveCurrentVehicle();
    const canvas = await renderInvoiceCanvas();
    const { jsPDF } = window.jspdf;

    const imgData = canvas.toDataURL('image/jpeg', 1.0);
    const pxW = canvas.width;
    const pxH = canvas.height;

    // US Letter size: 8.5" × 11" = 215.9mm × 279.4mm
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });
    
    const pageW = 215.9;  // Letter width in mm
    const pageH = 279.4;  // Letter height in mm
    
    // Scale image to fit within letter size while maintaining aspect ratio
    const imgAspect = pxW / pxH;
    const pageAspect = pageW / pageH;
    
    let finalW, finalH;
    if (imgAspect > pageAspect) {
        // Image is wider - fit to width
        finalW = pageW;
        finalH = pageW / imgAspect;
    } else {
        // Image is taller - fit to height
        finalH = pageH;
        finalW = pageH * imgAspect;
    }
    
    // Center the image on the page
    const x = (pageW - finalW) / 2;
    const y = (pageH - finalH) / 2;
    
    doc.addImage(imgData, 'JPEG', x, y, finalW, finalH);
    doc.save(getExportFilename('pdf'));
}

/* ── EXPORT WRAPPER: shows loading state ── */
async function runExport(fnName, btn, loadingLabel) {
    const original = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = loadingLabel;
    try {
        await window[fnName]();
    } finally {
        btn.disabled = false;
        btn.innerHTML = original;
    }
}
