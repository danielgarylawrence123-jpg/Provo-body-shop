<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 155">
  <defs>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- ═══ LEFT SPRAY GUN ═══ -->
  <!-- Barrel -->
  <rect x="10" y="62" width="62" height="16" rx="4" fill="url(#metalGrad)"/>
  <rect x="10" y="62" width="62" height="5" rx="4" fill="#9ca3af" opacity="0.35"/>
  <!-- Handle -->
  <rect x="28" y="78" width="18" height="32" rx="4" fill="#374151"/>
  <!-- Grip lines -->
  <line x1="32" y1="83" x2="32" y2="107" stroke="#4b5563" stroke-width="1.5" opacity="0.7"/>
  <line x1="36" y1="83" x2="36" y2="107" stroke="#4b5563" stroke-width="1.5" opacity="0.7"/>
  <line x1="40" y1="83" x2="40" y2="107" stroke="#4b5563" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="83" x2="44" y2="107" stroke="#4b5563" stroke-width="1.5" opacity="0.7"/>
  <!-- Trigger guard -->
  <path d="M 34 78 Q 27 87 27 96 L 34 96" fill="none" stroke="#6b7280" stroke-width="2.5"/>
  <!-- Trigger -->
  <rect x="32" y="82" width="7" height="11" rx="2.5" fill="#9ca3af"/>
  <!-- Nozzle tip -->
  <polygon points="72,60 72,78 86,69" fill="#6b7280"/>
  <!-- Nozzle ring -->
  <rect x="66" y="65" width="9" height="9" rx="2" fill="#4b5563"/>
  <!-- Air fitting -->
  <ellipse cx="37" cy="111" rx="6" ry="4" fill="#4b5563"/>
  <path d="M 37 115 Q 37 122 30 124" fill="none" stroke="#374151" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ═══ LEFT PAINT SPRAY ═══ -->
  <circle cx="96"  cy="67" r="5.5" fill="#3b82f6" opacity="0.9"/>
  <circle cx="104" cy="78" r="4.5" fill="#2563eb" opacity="0.85"/>
  <circle cx="91"  cy="80" r="3.5" fill="#60a5fa" opacity="0.8"/>
  <circle cx="108" cy="69" r="3"   fill="#38bdf8" opacity="0.85"/>
  <circle cx="99"  cy="87" r="3"   fill="#7dd3fc" opacity="0.75"/>
  <circle cx="87"  cy="73" r="2.5" fill="#bae6fd" opacity="0.8"/>
  <circle cx="105" cy="91" r="2.5" fill="#60a5fa" opacity="0.7"/>
  <circle cx="93"  cy="93" r="2"   fill="#ffffff"  opacity="0.65"/>
  <circle cx="111" cy="83" r="2"   fill="#3b82f6" opacity="0.75"/>
  <circle cx="86"  cy="90" r="1.5" fill="#38bdf8" opacity="0.65"/>
  <circle cx="109" cy="75" r="1.5" fill="#e0f2fe" opacity="0.75"/>
  <circle cx="97"  cy="63" r="2"   fill="#93c5fd" opacity="0.75"/>
  <circle cx="88"  cy="96" r="1.5" fill="#60a5fa" opacity="0.55"/>

  <!-- ═══ CAR ═══ -->
  <!-- Ground shadow -->
  <ellipse cx="200" cy="120" rx="86" ry="5" fill="#000000" opacity="0.35"/>

  <!-- Lower body -->
  <rect x="112" y="82" width="176" height="26" rx="4" fill="url(#carGrad)"/>

  <!-- Cabin -->
  <path d="M 142 82 L 156 52 Q 163 46 173 46 L 234 46 Q 244 46 250 52 L 263 82 Z" fill="url(#carGrad)"/>

  <!-- Body crease line -->
  <line x1="112" y1="94" x2="288" y2="94" stroke="#94a3b8" stroke-width="1" opacity="0.55"/>

  <!-- Front windshield -->
  <path d="M 155 80 L 167 54 L 199 54 L 199 80 Z" fill="#1e3a5f" opacity="0.88"/>
  <path d="M 159 77 L 169 57 L 184 57 L 184 77 Z" fill="#60a5fa" opacity="0.14"/>

  <!-- B-pillar -->
  <rect x="200" y="54" width="6" height="26" fill="#cbd5e1" opacity="0.65"/>

  <!-- Rear window -->
  <path d="M 209 54 L 209 80 L 251 80 L 261 55 Z" fill="#1e3a5f" opacity="0.88"/>
  <path d="M 213 58 L 213 77 L 239 77 L 246 61 Z" fill="#60a5fa" opacity="0.14"/>

  <!-- Door handle front -->
  <rect x="166" y="91" width="18" height="4" rx="2" fill="#94a3b8"/>
  <!-- Door handle rear -->
  <rect x="220" y="91" width="18" height="4" rx="2" fill="#94a3b8"/>

  <!-- Headlight -->
  <rect x="114" y="86" width="16" height="9" rx="2" fill="#fef3c7"/>
  <rect x="114" y="86" width="16" height="9" rx="2" fill="#fbbf24" opacity="0.55"/>
  <ellipse cx="120" cy="90" rx="4" ry="3" fill="#fef9c3"/>

  <!-- Grill -->
  <rect x="112" y="98" width="12" height="9" rx="1.5" fill="#0f172a" opacity="0.9"/>
  <line x1="112" y1="101" x2="124" y2="101" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="112" y1="104" x2="124" y2="104" stroke="#1d4ed8" stroke-width="1.5"/>

  <!-- Rear light -->
  <rect x="276" y="86" width="10" height="9" rx="2" fill="#fecaca"/>
  <rect x="276" y="86" width="10" height="9" rx="2" fill="#ef4444" opacity="0.65"/>

  <!-- Front bumper trim -->
  <rect x="112" y="104" width="24" height="4" rx="2" fill="#94a3b8" opacity="0.5"/>
  <!-- Rear bumper trim -->
  <rect x="264" y="104" width="24" height="4" rx="2" fill="#94a3b8" opacity="0.5"/>

  <!-- FRONT WHEEL -->
  <circle cx="150" cy="108" r="19" fill="url(#wheelGrad)"/>
  <circle cx="150" cy="108" r="13" fill="#1e293b"/>
  <line x1="150" y1="95" x2="150" y2="121" stroke="#475569" stroke-width="2.5"/>
  <line x1="137" y1="108" x2="163" y2="108" stroke="#475569" stroke-width="2.5"/>
  <line x1="141" y1="99" x2="159" y2="117" stroke="#475569" stroke-width="2"/>
  <line x1="159" y1="99" x2="141" y2="117" stroke="#475569" stroke-width="2"/>
  <circle cx="150" cy="108" r="5"   fill="#334155"/>
  <circle cx="150" cy="108" r="2.5" fill="#60a5fa"/>
  <path d="M 135 100 Q 131 108 135 116" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.12"/>

  <!-- REAR WHEEL -->
  <circle cx="250" cy="108" r="19" fill="url(#wheelGrad)"/>
  <circle cx="250" cy="108" r="13" fill="#1e293b"/>
  <line x1="250" y1="95" x2="250" y2="121" stroke="#475569" stroke-width="2.5"/>
  <line x1="237" y1="108" x2="263" y2="108" stroke="#475569" stroke-width="2.5"/>
  <line x1="241" y1="99" x2="259" y2="117" stroke="#475569" stroke-width="2"/>
  <line x1="259" y1="99" x2="241" y2="117" stroke="#475569" stroke-width="2"/>
  <circle cx="250" cy="108" r="5"   fill="#334155"/>
  <circle cx="250" cy="108" r="2.5" fill="#60a5fa"/>
  <path d="M 235 100 Q 231 108 235 116" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.12"/>

  <!-- ═══ RIGHT PAINT SPRAY ═══ -->
  <circle cx="304" cy="67" r="5.5" fill="#3b82f6" opacity="0.9"/>
  <circle cx="296" cy="78" r="4.5" fill="#2563eb" opacity="0.85"/>
  <circle cx="309" cy="80" r="3.5" fill="#60a5fa" opacity="0.8"/>
  <circle cx="292" cy="69" r="3"   fill="#38bdf8" opacity="0.85"/>
  <circle cx="301" cy="87" r="3"   fill="#7dd3fc" opacity="0.75"/>
  <circle cx="313" cy="73" r="2.5" fill="#bae6fd" opacity="0.8"/>
  <circle cx="295" cy="91" r="2.5" fill="#60a5fa" opacity="0.7"/>
  <circle cx="307" cy="93" r="2"   fill="#ffffff"  opacity="0.65"/>
  <circle cx="289" cy="83" r="2"   fill="#3b82f6" opacity="0.75"/>
  <circle cx="314" cy="90" r="1.5" fill="#38bdf8" opacity="0.65"/>
  <circle cx="291" cy="75" r="1.5" fill="#e0f2fe" opacity="0.75"/>
  <circle cx="303" cy="63" r="2"   fill="#93c5fd" opacity="0.75"/>
  <circle cx="312" cy="96" r="1.5" fill="#60a5fa" opacity="0.55"/>

  <!-- ═══ RIGHT SPRAY GUN (mirrored) ═══ -->
  <rect x="328" y="62" width="62" height="16" rx="4" fill="url(#metalGrad)"/>
  <rect x="328" y="62" width="62" height="5" rx="4" fill="#9ca3af" opacity="0.35"/>
  <rect x="354" y="78" width="18" height="32" rx="4" fill="#374151"/>
  <line x1="356" y1="83" x2="356" y2="107" stroke="#4b5563" stroke-width="1.5" opacity="0.7"/>
  <line x1="360" y1="83" x2="360" y2="107" stroke="#4b5563" stroke-width="1.5" opacity="0.7"/>
  <line x1="364" y1="83" x2="364" y2="107" stroke="#4b5563" stroke-width="1.5" opacity="0.7"/>
  <line x1="368" y1="83" x2="368" y2="107" stroke="#4b5563" stroke-width="1.5" opacity="0.7"/>
  <path d="M 366 78 Q 373 87 373 96 L 366 96" fill="none" stroke="#6b7280" stroke-width="2.5"/>
  <rect x="361" y="82" width="7" height="11" rx="2.5" fill="#9ca3af"/>
  <!-- Nozzle tip pointing left -->
  <polygon points="328,60 328,78 314,69" fill="#6b7280"/>
  <rect x="325" y="65" width="9" height="9" rx="2" fill="#4b5563"/>
  <ellipse cx="363" cy="111" rx="6" ry="4" fill="#4b5563"/>
  <path d="M 363 115 Q 363 122 370 124" fill="none" stroke="#374151" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ═══ LOGO TEXT ═══ -->
  <text x="200" y="144" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif"
        font-size="16" font-weight="800" fill="#ffffff" letter-spacing="3.5">PROVO BODY SHOP</text>
  <text x="200" y="154" text-anchor="middle"
        font-family="Inter,Arial,sans-serif"
        font-size="8" font-weight="600" fill="#60a5fa" letter-spacing="2.5">PROFESSIONAL AUTO BODY REPAIR</text>
</svg>
